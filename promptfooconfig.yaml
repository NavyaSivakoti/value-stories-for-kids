# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Value Stories for Kids Eval"

# The prompt is a two-message chat: the system message holds the real
# system_prompt.txt, the user message holds the story request.
prompts:
  - file://story_prompt.json

providers:
  - openai:gpt-4.1
  - anthropic:messages:claude-haiku-4-5
  - google:gemini-3-flash-preview

# defaultTest applies to every test case. Here it loads system_prompt.txt
# from disk into the {{system_prompt}} variable, so every story is
# generated with your real system prompt.
defaultTest:
  vars:
    system_prompt: file://system_prompt.txt

# The test inputs (name, age, value for each child).
tests: file://random_children_data.yaml

